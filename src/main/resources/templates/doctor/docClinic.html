<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor - My Clinics</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- PRO DOCTOR THEME ENGINE --- */
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --navbar-bg: rgba(30, 41, 59, 0.95);
            --accent-primary: #10b981;
            /* Doctor Green */
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(15, 23, 42, 0.6);
            --navbar-height: 70px;
        }

        [data-bs-theme="light"] {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --navbar-bg: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--navbar-height);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- FIXED LAYOUT --- */
        .navbar {
            background-color: var(--navbar-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--navbar-height);
            z-index: 1030;
        }

        .sidebar {
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: var(--navbar-height);
            bottom: 0;
            left: 0;
            width: 16.666667%;
            overflow-y: auto;
            padding-top: 1.5rem;
            z-index: 100;
        }

        main {
            margin-left: 16.666667%;
            width: 83.333333%;
        }

        @media (max-width: 767.98px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
                border-right: none;
            }

            main {
                margin-left: 0;
                width: 100%;
            }
        }

        /* --- COMPONENTS --- */
        .nav-link {
            color: var(--text-muted);
            font-weight: 500;
            padding: 12px 20px;
            margin: 8px 15px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .nav-link:hover {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-primary);
        }

        .nav-link.active {
            background: var(--accent-primary);
            color: #fff;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Clinic Card Hover Effects */
        .clinic-card {
            transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .clinic-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .form-control,
        .form-select {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 8px;
            padding: 10px 15px;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: var(--input-bg);
            color: var(--text-main);
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.25);
        }

        .modal-content {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        [data-bs-theme="light"] .btn-close {
            filter: none;
        }

        .text-accent {
            color: var(--accent-primary) !important;
        }

        .stat-card.mb-4 {
            position: sticky;
            top: 90px;
            /* below navbar */
            z-index: 1020;
        }

        .btn-primary {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            font-weight: 600;
            color: white;
        }

        .btn-primary:hover {
            background-color: #059669;
            border-color: #059669;
        }

        .theme-toggle {
            cursor: pointer;
            font-size: 1.2rem;
            color: var(--accent-primary);
        }
    </style>
</head>

<body data-bs-theme="dark">

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/doctor/dashboard"
                style="color: var(--text-main)">
                <div class="bg-success rounded-3 p-2 me-2 d-flex align-items-center justify-content-center"
                    style="width:35px; height:35px;">
                    <i class="fas fa-user-md text-white"></i>
                </div>
                <span>HMS<span class="text-success">DOCTOR</span></span>
            </a>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item me-4">
                        <div class="theme-toggle" id="themeSwitcher">
                            <i class="fas fa-moon" id="themeIcon"></i>
                        </div>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" data-bs-toggle="dropdown"
                            style="color: var(--text-main)">
                            <img id="doctorAvatar" class="rounded-circle me-2" width="32">
                            <span id="doctorDisplayName"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0" style="background: var(--card-bg);">
                            <li><a class="dropdown-item text-secondary" href="/doctor/home">My Profile</a></li>
                            <li>
                                <hr class="dropdown-divider bg-secondary">
                            </li>
                            <li><a class="dropdown-item text-danger" href="/" onclick="logout()">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">

            <nav class="col-md-2 sidebar px-0">
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/doctor/dashboard"><i
                                class="fas fa-chart-line me-2"></i> Overview</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/doctor/clinics"><i
                                class="fas fa-hospital me-2"></i> Clinic</a></li>
                    <li class="nav-item"><a class="nav-link" href="/doctor/patients"><i
                                class="fas fa-user-injured me-2"></i> My Patients</a></li>
                    <li class="nav-item"><a class="nav-link" href="/doctor/tests"><i class="fas fa-vials me-2"></i>
                            Medical Tests</a></li>
                    <li class="nav-item"><a class="nav-link" href="/doctor/view-prescription"><i
                                class="fas fa-file-prescription me-2"></i> Prescriptions</a></li>
                    <li class="nav-item"><a class="nav-link" href="/doctor/medicine"><i class="fas fa-pills me-2"></i>
                            Inventory</a></li>
                </ul>
            </nav>

            <main class="col-md-10 py-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold mb-0 text-white-custom">My Clinics & Locations</h2>
                        <p class="text-secondary mb-0">Manage hospital branches and practice locations</p>
                    </div>
                </div>

                <div id="alertContainer"></div>

                <div class="card stat-card mb-4">
                    <div class="card-header border-bottom border-secondary border-opacity-10 bg-transparent py-3">
                        <h6 class="mb-0 fw-bold text-accent"><i class="fas fa-filter me-2"></i>Search & Filter</h6>
                    </div>
                    <div class="card-body">
                        <form id="filterForm" class="row g-3">
                            <div class="col-md-3">
                                <label class="form-label small text-muted">Clinic Name</label>
                                <input type="text" class="form-control" id="filterClinicName"
                                    placeholder="Search by name...">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small text-muted">Status</label>
                                <select class="form-select" id="filterStatus">
                                    <option value="">All Statuses</option>
                                    <option value="ACTIVE">Active</option>
                                    <option value="CLOSED">Closed</option>
                                    <option value="MAINTENANCE">Maintenance</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label small text-muted">City</label>
                                <input type="text" class="form-control" id="filterCity" placeholder="Search city...">
                            </div>
                            <div class="col-md-2">
                                <label class="form-label small text-muted">Clinic Type</label>
                                <input type="text" class="form-control" id="filterClinicType"
                                    placeholder="Hospital, Private...">
                            </div>

                            <div class="col-md-2">
                                <label class="form-label small text-muted">Department</label>
                                <input type="text" class="form-control" id="filterDepartment" placeholder="Cardiology">
                            </div>

                            <div class="col-md-2">
                                <label class="form-label small text-muted">Service</label>
                                <input type="text" class="form-control" id="filterService" placeholder="XRay">
                            </div>

                            <div class="col-md-2">
                                <label class="form-label small text-muted">Appointment Required</label>
                                <select class="form-select" id="filterAppointmentRequired">
                                    <option value="">All</option>
                                    <option value="true">Yes</option>
                                    <option value="false">No</option>
                                </select>
                            </div>
                            <div class="col-md-4 d-flex align-items-end">
                                <button type="button" class="btn btn-outline-secondary w-100 py-2 rounded-3"
                                    onclick="resetFilters()">
                                    <i class="fas fa-undo me-2"></i> Reset Filters
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="mt-4">
                    <h5 class="mb-3 text-white-custom"><i class="fas fa-list me-2"></i> Associated Locations</h5>
                    <div id="clinicsCardContainer" class="row g-3">
                        <div class="col-12 text-center text-muted py-4">Loading clinics...</div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        // --- THEME ENGINE ---
        $(document).ready(function () {
            const savedTheme = localStorage.getItem('hms_theme') || 'dark';
            applyTheme(savedTheme);
        });

        $('#themeSwitcher').on('click', () => {
            const currentTheme = $('body').attr('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        });

        function applyTheme(theme) {
            $('body').attr('data-bs-theme', theme);
            localStorage.setItem('hms_theme', theme);
            const icon = $('#themeIcon');
            if (theme === 'light') {
                icon.removeClass('fa-moon').addClass('fa-sun');
            } else {
                icon.removeClass('fa-sun').addClass('fa-moon');
            }
        }

        // --- CLINIC MANAGEMENT LOGIC ---

        // Load clinics
        async function loadClinics(filters = {}) {
            try {
                let clinics = [];
                try {
                    const response = await axios.get('/api/clinics');
                    clinics = response.data;
                } catch (e) {
                    clinics = [
                        { clinicId: 'C001', clinicName: 'City Hospital', clinicType: 'Hospital', status: 'ACTIVE', address: { city: 'New York' }, contact: { phone: '12345' }, departments: ['Cardiology', 'Neurology'], services: ['XRay', 'MRI'], appointmentRequired: true },
                        { clinicId: 'C002', clinicName: 'Downtown OPD', clinicType: 'OPD', status: 'CLOSED', address: { city: 'Chicago' }, contact: { phone: '67890' }, departments: ['General'], services: ['Consultation'], appointmentRequired: false }
                    ];
                }

                // APPLY ALL FILTERS
                clinics = clinics.filter(c => {
                    let match = true;
                    if (filters.clinicName && !c.clinicName?.toLowerCase().includes(filters.clinicName.toLowerCase())) match = false;
                    if (filters.status && c.status !== filters.status) match = false;
                    if (filters.city && !c.address?.city?.toLowerCase().includes(filters.city.toLowerCase())) match = false;
                    if (filters.clinicType && !c.clinicType?.toLowerCase().includes(filters.clinicType.toLowerCase())) match = false;
                    if (filters.department && !c.departments?.some(d => d.toLowerCase().includes(filters.department.toLowerCase()))) match = false;
                    if (filters.service && !c.services?.some(s => s.toLowerCase().includes(filters.service.toLowerCase()))) match = false;
                    if (filters.appointmentRequired && filters.appointmentRequired !== "") {
                        const required = filters.appointmentRequired === "true";
                        if (c.appointmentRequired !== required) match = false;
                    }
                    return match;
                });

                const container = document.getElementById('clinicsCardContainer');
                container.innerHTML = '';

                if (clinics.length === 0) {
                    container.innerHTML = `
                        <div class="col-12">
                            <div class="card stat-card text-center py-5">
                                <i class="fas fa-search fa-3x text-muted mb-3"></i>
                                <h5 class="text-muted">No clinics found matching criteria</h5>
                            </div>
                        </div>`;
                } else {
                    clinics.forEach(clinic => {
                        const statusBadge = clinic.status === 'ACTIVE' ? 'bg-success' : 'bg-danger';

                        const appointmentBadge = clinic.appointmentRequired
                            ? '<span class="badge bg-warning text-dark px-2 py-1"><i class="fas fa-calendar-check me-1"></i>Appt. Required</span>'
                            : '<span class="badge bg-secondary bg-opacity-50 text-light px-2 py-1"><i class="fas fa-walking me-1"></i>Walk-in</span>';

                        const name = clinic.clinicName || 'N/A';
                        const type = clinic.clinicType || 'N/A';
                        const city = clinic.address?.city || 'N/A';
                        const phone = clinic.contact?.phone || 'N/A';
                        const depts = clinic.departments?.join(', ') || 'N/A';
                        const services = clinic.services?.join(', ') || 'N/A';
                        const clinicId = clinic.clinicId || 'N/A';

                        const cardHTML = `
                            <div class="col-md-6 col-lg-4 col-xl-3">
                                <div class="card stat-card clinic-card h-100">
                                    <div class="card-body p-3 d-flex flex-column">
                                        
                                        <div class="d-flex align-items-center mb-3 pb-3 border-bottom border-secondary border-opacity-10">
                                            <div class="bg-success bg-opacity-10 rounded-circle p-2 me-3 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                                <i class="fas fa-hospital text-success fa-lg"></i>
                                            </div>
                                            <div class="overflow-hidden">
                                                <h6 class="mb-1 fw-bold text-truncate" title="${name}">${name}</h6>
                                                <span class="badge bg-success bg-opacity-10 text-success border border-success border-opacity-25 rounded-pill">${type}</span>
                                            </div>
                                        </div>
                                        
                                        <div class="d-flex flex-column gap-2 mb-3 small text-muted flex-grow-1">
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-hashtag me-2 text-secondary" style="width: 15px;"></i> 
                                                <span>${clinicId}</span>
                                            </div>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-map-marker-alt me-2 text-secondary" style="width: 15px;"></i> 
                                                <span class="text-truncate" title="${city}">${city}</span>
                                            </div>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-phone me-2 text-secondary" style="width: 15px;"></i> 
                                                <span>${phone}</span>
                                            </div>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-stethoscope me-2 text-secondary" style="width: 15px;"></i> 
                                                <span class="text-truncate" title="${depts}">${depts}</span>
                                            </div>
                                            <div class="d-flex align-items-center">
                                                <i class="fas fa-notes-medical me-2 text-secondary" style="width: 15px;"></i> 
                                                <span class="text-truncate" title="${services}">${services}</span>
                                            </div>
                                        </div>
                                        
                                        <div class="d-flex justify-content-between align-items-center pt-2 mt-auto border-top border-secondary border-opacity-10">
                                            ${appointmentBadge}
                                            <span class="badge ${statusBadge}">${clinic.status || 'UNKNOWN'}</span>
                                        </div>
                                        
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += cardHTML;
                    });
                }
            } catch (error) {
                console.error('Error loading clinics:', error);
                showAlert('Error loading clinics', 'danger');
            }
        }

        function applyFilters() {
            const filters = {
                clinicName: document.getElementById('filterClinicName')?.value || '',
                status: document.getElementById('filterStatus')?.value || '',
                city: document.getElementById('filterCity')?.value || '',
                clinicType: document.getElementById('filterClinicType')?.value || '',
                department: document.getElementById('filterDepartment')?.value || '',
                service: document.getElementById('filterService')?.value || '',
                appointmentRequired: document.getElementById('filterAppointmentRequired')?.value || ''
            };

            loadClinics(filters);
        }

        function resetFilters() {
            document.getElementById('filterForm').reset();
            loadClinics();
        }

        function showAlert(message, type) {
            const alertHTML = `
                <div class="alert alert-${type} alert-dismissible fade show shadow-sm" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            document.getElementById('alertContainer').insertAdjacentHTML('beforeend', alertHTML);
            setTimeout(() => { document.querySelector('.alert')?.remove(); }, 5000);
        }

        // Apply debounced input for smooth typing filters
        let typingTimer;
        const doneTypingInterval = 300;

        ['filterClinicName', 'filterCity', 'filterClinicType', 'filterDepartment', 'filterService'].forEach(id => {
            const el = document.getElementById(id);
            if (el) {
                el.addEventListener('input', () => {
                    clearTimeout(typingTimer);
                    typingTimer = setTimeout(applyFilters, doneTypingInterval);
                });
            }
        });

        document.getElementById('filterStatus').addEventListener('change', applyFilters);
        document.getElementById('filterAppointmentRequired').addEventListener('change', applyFilters);

        document.addEventListener('DOMContentLoaded', () => {
            const name = localStorage.getItem("userName");
            if (name) {
                document.getElementById("doctorDisplayName").innerText = name;
                document.getElementById("doctorAvatar").src = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=10b981&color=fff`;
            }
            loadClinics();
        });
    </script>
</body>

</html>
