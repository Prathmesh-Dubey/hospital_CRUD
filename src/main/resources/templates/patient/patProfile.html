<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Profile - HMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- PATIENT THEME ENGINE --- */
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --navbar-bg: rgba(30, 41, 59, 0.95);
            --accent-primary: #2dd4bf;
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(15, 23, 42, 0.6);
            --navbar-height: 70px;
        }

        [data-bs-theme="light"] {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --navbar-bg: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--navbar-height);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- FIXED LAYOUT --- */
        .navbar {
            background-color: var(--navbar-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            min-height: var(--navbar-height);
            z-index: 1030;
        }

        .sidebar {
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: var(--navbar-height);
            bottom: 0;
            left: 0;
            width: 16.666667%;
            overflow-y: auto;
            padding-top: 1.5rem;
            z-index: 100;
        }

        main {
            margin-left: 16.666667%;
            width: 83.333333%;
        }

        @media (max-width: 991.98px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 1rem;
            }

            main {
                margin-left: 0;
                width: 100%;
            }
        }

        /* --- COMPONENTS --- */
        .nav-link {
            color: var(--text-muted);
            font-weight: 500;
            padding: 12px 20px;
            margin: 8px 15px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .nav-link:hover {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent-primary);
        }

        .nav-link.active {
            background: var(--accent-primary);
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3);
            font-weight: 600;
        }

        .search-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
        }

        .search-wrapper input {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main) !important;
            padding-left: 45px;
        }

        .search-wrapper .fa-search {
            position: absolute;
            left: 18px;
            top: 12px;
            color: var(--accent-primary);
        }

        .theme-toggle {
            cursor: pointer;
            color: var(--accent-primary);
        }

        .text-white-custom {
            color: var(--text-main) !important;
        }

        .text-accent {
            color: var(--accent-primary) !important;
        }

        /* --- PROFILE SPECIFIC --- */
        .profile-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .section-title {
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
            font-weight: 600;
            color: var(--text-main);
        }

        .label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 5px;
        }

        /* Dynamic Input Styling */
        .form-control, .form-select {
            background-color: var(--input-bg) !important;
            border: 1px solid var(--border-color);
            color: var(--text-main) !important;
        }

        .form-control:disabled, .form-select:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
    </style>
</head>

<body data-bs-theme="dark">

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/patient/dashboard"
                style="color: var(--text-main)">
                <div class="bg-primary bg-opacity-25 rounded-3 p-2 me-2 d-flex align-items-center justify-content-center"
                    style="width:35px; height:35px;">
                    <i class="fas fa-heartbeat text-info"></i>
                </div>
                <span>HMS<span class="text-accent">PATIENT</span></span>
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
                <i class="fas fa-bars text-accent fs-4"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="mx-auto search-wrapper my-3 my-lg-0">
                    <i class="fas fa-search"></i>
                    <input class="form-control" type="text" placeholder="Search doctors, clinics...">
                </div>

                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item me-lg-4 mb-3 mb-lg-0 d-flex justify-content-center">
                        <div class="theme-toggle fs-5" id="themeSwitcher">
                            <i class="fas fa-moon" id="themeIcon"></i>
                        </div>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center justify-content-center justify-content-lg-start"
                            href="#" data-bs-toggle="dropdown" style="color: var(--text-main); margin: 0; padding: 0;">
                            <img id="navPatientAvatar" class="rounded-circle me-2" width="32">
                            <span id="navPatientName">Patient</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 mt-lg-2"
                            style="background: var(--card-bg);">
                            <li><a class="dropdown-item text-secondary" href="/patient/profile">My Profile</a></li>
                            <li>
                                <hr class="dropdown-divider bg-secondary">
                            </li>
                            <li><a class="dropdown-item text-danger" href="/">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar px-0">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/dashboard">
                            <i class="fas fa-home me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/doctors">
                            <i class="fas fa-user-md me-2"></i> Find Doctors
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/clinics">
                            <i class="fas fa-hospital-alt me-2"></i> Clinics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/medTest">
                            <i class="fas fa-flask me-2"></i> Lab Tests
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/prescriptions">
                            <i class="fas fa-prescription me-2"></i> My Prescriptions
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 py-4">
                <div class="container max-w-4xl">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-4">
                        <div>
                            <h2 class="fw-bold mb-0 text-white-custom">My Profile</h2>
                            <p class="text-secondary mb-0">Manage your personal and medical information.</p>
                        </div>
                    </div>

                    <div class="profile-card">
                        <div class="text-center mb-4">
                            <img id="profileAvatar" class="rounded-circle mb-3" width="100">
                            <h3 id="profileName" class="text-white-custom"></h3>
                            <small id="profilePatientId" class="text-muted"></small>
                        </div>

                        <div class="text-center mb-4">
                            <button id="editBtn" class="btn btn-outline-info px-4" onclick="enableEdit()">
                                <i class="fas fa-edit me-2"></i> Edit Profile
                            </button>
                            <button id="saveBtn" class="btn btn-success d-none px-4 me-2" onclick="saveProfile()">
                                <i class="fas fa-save me-2"></i> Save Changes
                            </button>
                            <button id="cancelBtn" class="btn btn-secondary d-none px-4" onclick="cancelEdit()">
                                Cancel
                            </button>
                        </div>

                        <div class="mb-4">
                            <div class="section-title">Personal Information</div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="label">Full Name</label>
                                    <input type="text" id="fullName" class="form-control" disabled>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Date of Birth</label>
                                    <input type="date" id="dob" class="form-control" disabled>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Gender</label>
                                    <select id="gender" class="form-select" disabled>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Blood Group</label>
                                    <select id="bloodGroup" class="form-select" disabled>
                                        <option value="">Select Blood Group</option>
                                        <option value="A+">A+</option>
                                        <option value="A-">A-</option>
                                        <option value="B+">B+</option>
                                        <option value="B-">B-</option>
                                        <option value="O+">O+</option>
                                        <option value="O-">O-</option>
                                        <option value="AB+">AB+</option>
                                        <option value="AB-">AB-</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Height (cm)</label>
                                    <input type="number" id="height" class="form-control" disabled>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Weight (kg)</label>
                                    <input type="number" id="weight" class="form-control" disabled>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="label">Allergies (Comma separated)</label>
                                    <input type="text" id="allergies" class="form-control" disabled>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="label">Chronic Diseases (Comma separated)</label>
                                    <input type="text" id="chronicDiseases" class="form-control" disabled>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="label">Current Medications (Comma separated)</label>
                                    <input type="text" id="currentMedications" class="form-control" disabled>
                                </div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <div class="section-title">Contact Information</div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="label">Phone</label>
                                    <input type="text" id="phone" class="form-control" disabled>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Email</label>
                                    <input type="email" id="emailAddress" class="form-control" disabled>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="label">Address</label>
                                    <input type="text" id="residentialAddress" class="form-control" disabled>
                                </div>
                                <div class="col-md-12 mb-3">
                                    <label class="label">Emergency Contact</label>
                                    <input type="text" id="emergencyContact" class="form-control" disabled>
                                </div>
                            </div>
                        </div>

                        <hr class="my-5 border-secondary">

                        <div>
                            <div class="section-title text-danger"><i class="fas fa-shield-alt me-2"></i> Security Settings</div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="label">Confirm Phone Number</label>
                                    <input type="text" id="confirmPhone" class="form-control" placeholder="Enter registered phone">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="label">Confirm Email Address</label>
                                    <input type="email" id="confirmEmail" class="form-control" placeholder="Enter registered email">
                                </div>
                                <div class="col-md-12 mb-4">
                                    <label class="label">New Password</label>
                                    <div class="input-group">
                                        <input type="password" id="newPassword" class="form-control" placeholder="Minimum 6 characters">
                                        <button class="btn btn-outline-secondary border-start-0" type="button" onclick="togglePassword()" style="background-color: var(--input-bg);">
                                            <i id="eyeIcon" class="fas fa-eye text-muted"></i>
                                        </button>
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <button class="btn btn-danger w-100 py-2 fw-bold" onclick="changePassword()" id="pwdBtn">
                                        Update Password
                                    </button>
                                </div>
                                <div class="col-md-12 mt-3 text-center" id="passwordMessage"></div>
                            </div>
                        </div>

                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        // --- 1. THEME ENGINE ---
        $(document).ready(function () {
            const savedTheme = localStorage.getItem('hms_theme') || 'dark';
            applyTheme(savedTheme);
            loadProfile();
        });

        $('#themeSwitcher').on('click', () => {
            const currentTheme = $('body').attr('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        });

        function applyTheme(theme) {
            $('body').attr('data-bs-theme', theme);
            localStorage.setItem('hms_theme', theme);
            const icon = $('#themeIcon');
            theme === 'light' ? icon.removeClass('fa-moon').addClass('fa-sun') : icon.removeClass('fa-sun').addClass('fa-moon');
        }

        // --- 2. PROFILE DATA HANDLING ---
        async function loadProfile() {
            const userId = localStorage.getItem("userId");
            const role = localStorage.getItem("userRole");
            const storedName = localStorage.getItem("userName");

            if (!userId || role !== "PATIENT") {
                window.location.href = "/";
                return;
            }

            document.getElementById("navPatientName").innerText = storedName || "Patient";
            document.getElementById("navPatientAvatar").src =
                `https://ui-avatars.com/api/?name=${storedName || "Patient"}&background=2dd4bf&color=0f172a`;

            try {
                const response = await axios.get(`/api/patients/by-patient-id/${userId}`);
                const p = response.data;

                document.getElementById("navPatientName").innerText = p.fullName;
                document.getElementById("profileName").innerText = p.fullName || "";
                document.getElementById("profilePatientId").innerText = p.patientId || `ID: ${userId}`;

                const avatarUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(p.fullName || "User")}&background=2dd4bf&color=0f172a`;
                document.getElementById("navPatientAvatar").src = avatarUrl;
                document.getElementById("profileAvatar").src = avatarUrl + "&size=128";

                // Personal Info
                document.getElementById("fullName").value = p.fullName || "";
                document.getElementById("dob").value = p.dateOfBirth || "";
                document.getElementById("gender").value = p.gender || "";
                document.getElementById("bloodGroup").value = p.bloodGroup || "";
                document.getElementById("height").value = p.height || "";
                document.getElementById("weight").value = p.weight || "";
                
                // Arrays to strings
                document.getElementById("allergies").value = p.allergies ? p.allergies.join(", ") : "";
                document.getElementById("chronicDiseases").value = p.chronicDiseases ? p.chronicDiseases.join(", ") : "";
                document.getElementById("currentMedications").value = p.currentMedications ? p.currentMedications.join(", ") : "";

                // Contact Info
                document.getElementById("phone").value = p.phone || "";
                document.getElementById("emailAddress").value = p.emailAddress || "";
                document.getElementById("residentialAddress").value = p.residentialAddress || "";
                document.getElementById("emergencyContact").value = p.emergencyContact || "";

                // Disable fields initially
                document.querySelectorAll(".form-control, .form-select").forEach(input => {
                    if (input.id !== "confirmPhone" && input.id !== "confirmEmail" && input.id !== "newPassword" && !input.closest('.search-wrapper')) {
                        input.setAttribute("disabled", true);
                    }
                });

            } catch (error) {
                console.error("Profile load failed:", error);
            }
        }

        // --- 3. PROFILE ACTIONS ---
        function enableEdit() {
            document.querySelectorAll("#fullName, #dob, #gender, #bloodGroup, #height, #weight, #allergies, #chronicDiseases, #currentMedications, #phone, #emailAddress, #residentialAddress, #emergencyContact")
                .forEach(input => input.removeAttribute("disabled"));

            document.getElementById("editBtn").classList.add("d-none");
            document.getElementById("saveBtn").classList.remove("d-none");
            document.getElementById("cancelBtn").classList.remove("d-none");
        }

        function cancelEdit() {
            document.querySelectorAll("#fullName, #dob, #gender, #bloodGroup, #height, #weight, #allergies, #chronicDiseases, #currentMedications, #phone, #emailAddress, #residentialAddress, #emergencyContact")
                .forEach(input => input.setAttribute("disabled", true));

            document.getElementById("editBtn").classList.remove("d-none");
            document.getElementById("saveBtn").classList.add("d-none");
            document.getElementById("cancelBtn").classList.add("d-none");

            loadProfile(); 
        }

        async function saveProfile() {
            const userId = localStorage.getItem("userId");
            if (!userId) return alert("Session expired. Please login again.");

            const updatedData = {
                fullName: document.getElementById("fullName").value.trim(),
                dateOfBirth: document.getElementById("dob").value,
                gender: document.getElementById("gender").value,
                bloodGroup: document.getElementById("bloodGroup").value,
                height: document.getElementById("height").value ? parseInt(document.getElementById("height").value) : null,
                weight: document.getElementById("weight").value ? parseInt(document.getElementById("weight").value) : null,
                
                allergies: document.getElementById("allergies").value 
                    ? document.getElementById("allergies").value.split(",").map(v => v.trim()).filter(v => v !== "") 
                    : [],
                chronicDiseases: document.getElementById("chronicDiseases").value 
                    ? document.getElementById("chronicDiseases").value.split(",").map(v => v.trim()).filter(v => v !== "") 
                    : [],
                currentMedications: document.getElementById("currentMedications").value 
                    ? document.getElementById("currentMedications").value.split(",").map(v => v.trim()).filter(v => v !== "") 
                    : [],
                
                phone: document.getElementById("phone").value.trim(),
                emailAddress: document.getElementById("emailAddress").value.trim(),
                residentialAddress: document.getElementById("residentialAddress").value.trim(),
                emergencyContact: document.getElementById("emergencyContact").value.trim()
            };

            try {
                await axios.put(`/api/patients/by-patient-id/${userId}`, updatedData);
                localStorage.setItem("userName", updatedData.fullName);
                alert("Profile updated successfully");
                await loadProfile();
                cancelEdit();
            } catch (error) {
                console.error("Update failed:", error);
                alert("Profile update failed. Please try again.");
            }
        }

        // --- 4. PASSWORD MANAGEMENT ---
        function togglePassword() {
            const input = document.getElementById("newPassword");
            const icon = document.getElementById("eyeIcon");

            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
            }
        }

        async function changePassword() {
            const userId = localStorage.getItem("userId");
            const phone = document.getElementById("confirmPhone").value.trim();
            const email = document.getElementById("confirmEmail").value.trim();
            const newPassword = document.getElementById("newPassword").value.trim();
            const msg = document.getElementById("passwordMessage");
            const btn = document.getElementById("pwdBtn");

            msg.innerHTML = "";

            if (!userId) {
                msg.innerHTML = "<span class='text-danger'><i class='fas fa-exclamation-circle'></i> Session expired. Please login again.</span>";
                return;
            }
            if (!phone || !email || !newPassword) {
                msg.innerHTML = "<span class='text-danger'><i class='fas fa-exclamation-circle'></i> All fields are required.</span>";
                return;
            }
            if (newPassword.length < 6) {
                msg.innerHTML = "<span class='text-danger'><i class='fas fa-exclamation-circle'></i> Password must be at least 6 characters long.</span>";
                return;
            }

            // Lock button during request
            const originalBtnText = btn.innerHTML;
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Updating...`;
            btn.disabled = true;

            try {
                // Ensure payload matches exactly what the backend expects
                const payload = {
                    userId: userId,
                    phone: phone,
                    email: email,
                    newPassword: newPassword
                };

                const response = await axios.put("/api/patients/change-password", payload);
                
                msg.innerHTML = "<span class='text-success fw-bold'><i class='fas fa-check-circle'></i> Password updated successfully!</span>";
                
                // Clear fields on success
                document.getElementById("newPassword").value = "";
                document.getElementById("confirmPhone").value = "";
                document.getElementById("confirmEmail").value = "";
                
            } catch (error) {
                console.error("Password change error:", error);
                
                // Attempt to extract the specific error message from the backend response
                let errorMsg = "Failed to update password. Please check your details.";
                if (error.response && error.response.data) {
                    // Sometimes spring returns a string, sometimes an object with a message field
                    errorMsg = typeof error.response.data === 'string' ? error.response.data : (error.response.data.message || errorMsg);
                }
                
                msg.innerHTML = `<span class='text-danger'><i class='fas fa-times-circle'></i> ${errorMsg}</span>`;
            } finally {
                // Unlock button
                btn.innerHTML = originalBtnText;
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
