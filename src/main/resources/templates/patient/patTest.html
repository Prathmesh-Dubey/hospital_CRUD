<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lab Tests - HMS</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- PATIENT THEME ENGINE --- */
        :root {
            --bg-color: #0f172a;
            --sidebar-bg: #1e293b;
            --card-bg: #1e293b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --navbar-bg: rgba(30, 41, 59, 0.95);
            --accent-primary: #2dd4bf;
            --border-color: rgba(255, 255, 255, 0.05);
            --input-bg: rgba(15, 23, 42, 0.6);
            --navbar-height: 70px;
        }

        [data-bs-theme="light"] {
            --bg-color: #f8fafc;
            --sidebar-bg: #ffffff;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --navbar-bg: rgba(255, 255, 255, 0.95);
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: #f1f5f9;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding-top: var(--navbar-height);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- FIXED LAYOUT --- */
        .navbar {
            background-color: var(--navbar-bg) !important;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            position: fixed;
            top: 0; left: 0; right: 0;
            min-height: var(--navbar-height);
            z-index: 1030;
        }

        .sidebar {
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            position: fixed;
            top: var(--navbar-height);
            bottom: 0; left: 0;
            width: 16.666667%;
            overflow-y: auto;
            padding-top: 1.5rem;
            z-index: 100;
        }

        main {
            margin-left: 16.666667%;
            width: 83.333333%;
        }

        @media (max-width: 991.98px) {
            .sidebar {
                position: static;
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
                padding-bottom: 1rem;
            }
            main {
                margin-left: 0;
                width: 100%;
            }
        }

        /* --- COMPONENTS --- */
        .nav-link {
            color: var(--text-muted);
            font-weight: 500;
            padding: 12px 20px;
            margin: 8px 15px;
            border-radius: 10px;
            transition: 0.2s;
        }
        .nav-link:hover {
            background: rgba(45, 212, 191, 0.1);
            color: var(--accent-primary);
        }
        .nav-link.active {
            background: var(--accent-primary);
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3);
            font-weight: 600;
        }

        .search-wrapper { position: relative; width: 100%; max-width: 400px; }
        .search-wrapper input {
            background: var(--input-bg) !important;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            color: var(--text-main) !important;
            padding-left: 45px;
        }
        .search-wrapper .fa-search {
            position: absolute; left: 18px; top: 12px;
            color: var(--accent-primary);
        }

        .theme-toggle { cursor: pointer; color: var(--accent-primary); }
        .text-white-custom { color: var(--text-main) !important; }
        .text-accent { color: var(--accent-primary) !important; }

        /* --- TABLE & CARD SPECIFIC --- */
        .content-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        /* Dynamically style the table to match themes */
        .table-custom {
            --bs-table-bg: transparent;
            --bs-table-color: var(--text-main);
            --bs-table-border-color: var(--border-color);
            --bs-table-hover-bg: rgba(45, 212, 191, 0.05);
            --bs-table-hover-color: var(--text-main);
        }
        .table-custom th {
            color: var(--text-muted);
            font-weight: 600;
            border-bottom-width: 2px;
            padding-bottom: 1rem;
        }
        .table-custom td {
            vertical-align: middle;
            padding: 1rem 0.5rem;
        }
    </style>
</head>

<body data-bs-theme="dark">

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-4">
            <a class="navbar-brand fw-bold d-flex align-items-center" href="/patient/dashboard" style="color: var(--text-main)">
                <div class="bg-primary bg-opacity-25 rounded-3 p-2 me-2 d-flex align-items-center justify-content-center" style="width:35px; height:35px;">
                    <i class="fas fa-heartbeat text-info"></i>
                </div>
                <span>HMS<span class="text-accent">PATIENT</span></span>
            </a>

            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars text-accent fs-4"></i>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="mx-auto search-wrapper my-3 my-lg-0">
                    <i class="fas fa-search"></i>
                    <input class="form-control" type="text" placeholder="Search doctors, clinics...">
                </div>

                <ul class="navbar-nav ms-auto align-items-lg-center">
                    <li class="nav-item me-lg-4 mb-3 mb-lg-0 d-flex justify-content-center">
                        <div class="theme-toggle fs-5" id="themeSwitcher">
                            <i class="fas fa-moon" id="themeIcon"></i>
                        </div>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle d-flex align-items-center justify-content-center justify-content-lg-start"
                            href="#" data-bs-toggle="dropdown" style="color: var(--text-main); margin: 0; padding: 0;">
                            <img id="navPatientAvatar" class="rounded-circle me-2" width="32">
                            <span id="navPatientName">Patient</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 mt-lg-2" style="background: var(--card-bg);">
                            <li><a class="dropdown-item text-secondary" href="/patient/profile">My Profile</a></li>
                            <li><hr class="dropdown-divider bg-secondary"></li>
                            <li><a class="dropdown-item text-danger" href="/">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 sidebar px-0">
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/dashboard">
                            <i class="fas fa-home me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/doctors">
                            <i class="fas fa-user-md me-2"></i> Find Doctors
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/clinics">
                            <i class="fas fa-hospital-alt me-2"></i> Clinics
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/patient/medTest">
                            <i class="fas fa-flask me-2"></i> Lab Tests
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/patient/prescriptions">
                            <i class="fas fa-prescription me-2"></i> My Prescriptions
                        </a>
                    </li>
                </ul>
            </nav>

            <main class="col-md-10 py-4">
                <div class="container-fluid max-w-6xl">
                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-end mb-4 gap-3">
                        <div>
                            <h2 class="fw-bold mb-0 text-white-custom">My Lab Tests</h2>
                            <p class="text-secondary mb-0">View and track your medical test results.</p>
                        </div>
                        <div class="text-md-end">
                            <a class="btn btn-primary" href="/patient/viewTest" style="background-color: var(--accent-primary); color: #0f172a; border: none; font-weight: 600;">
                                <i class="fas fa-search me-2"></i> Explore More Tests
                            </a>
                        </div>
                    </div>

                    <div class="content-card">
                        <div class="table-responsive">
                            <table class="table table-hover table-custom mb-0">
                                <thead>
                                    <tr>
                                        <th>Test ID</th>
                                        <th>Test Name</th>
                                        <th>Category</th>
                                        <th>Status</th>
                                        <th>Action</th>
                                    </tr>
                                </thead>
                                <tbody id="testTableBody">
                                    <tr>
                                        <td colspan="5" class="text-center py-4 text-muted">
                                            <i class="fas fa-spinner fa-spin me-2"></i> Loading your tests...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        // --- 1. THEME ENGINE ---
        $(document).ready(function () {
            const savedTheme = localStorage.getItem('hms_theme') || 'dark';
            applyTheme(savedTheme);
            loadNavProfile();
            loadTests();
        });

        $('#themeSwitcher').on('click', () => {
            const currentTheme = $('body').attr('data-bs-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(newTheme);
        });

        function applyTheme(theme) {
            $('body').attr('data-bs-theme', theme);
            localStorage.setItem('hms_theme', theme);
            const icon = $('#themeIcon');
            theme === 'light' ? icon.removeClass('fa-moon').addClass('fa-sun') : icon.removeClass('fa-sun').addClass('fa-moon');
        }

        // --- 2. AUTH & NAVBAR ---
        function loadNavProfile() {
            const userId = localStorage.getItem("userId");
            const role = localStorage.getItem("userRole");
            const storedName = localStorage.getItem("userName");

            if (!userId || role !== "PATIENT") {
                window.location.href = "/";
                return;
            }

            document.getElementById("navPatientName").innerText = storedName || "Patient";
            document.getElementById("navPatientAvatar").src = 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(storedName || "Patient")}&background=2dd4bf&color=0f172a`;
        }

        // --- 3. LOAD TESTS ---
        async function loadTests() {
            const patientId = localStorage.getItem("userId");
            const tbody = document.getElementById("testTableBody");

            try {
                const response = await axios.get(`/api/medical-tests/patients/${patientId}`);
                const tests = response.data;
                
                tbody.innerHTML = "";

                if (tests.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="text-center py-4 text-muted">
                                No lab tests found.
                            </td>
                        </tr>`;
                    return;
                }

                tests.forEach(test => {
                    let statusColor = "secondary";
                    let icon = "fa-clock";
                    
                    if (test.resultStatus === "Completed") {
                        statusColor = "success";
                        icon = "fa-check-circle";
                    } else if (test.resultStatus === "Pending") {
                        statusColor = "warning";
                    }

                    // For theming purposes, badges might need slight adjustments in dark mode,
                    // but standard bootstrap bg-success/warning work well enough globally.
                    tbody.innerHTML += `
                        <tr>
                            <td class="fw-bold text-muted">#${test.testId}</td>
                            <td class="fw-semibold">${test.testName}</td>
                            <td>${test.category}</td>
                            <td>
                                <span class="badge bg-${statusColor} bg-opacity-75 px-3 py-2 rounded-pill">
                                    <i class="fas ${icon} me-1"></i> ${test.resultStatus}
                                </span>
                            </td>
                            <td>
                                <a href="/patient/tests/${test.testId}" class="btn btn-sm btn-outline-info rounded-pill px-3">
                                    <i class="fas fa-eye me-1"></i> View Details
                                </a>
                            </td>
                        </tr>
                    `;
                });

            } catch (error) {
                console.error("Failed to load tests:", error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="text-center py-4 text-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i> Failed to load lab tests.
                        </td>
                    </tr>`;
            }
        }
    </script>
</body>
</html>
